services:
  db:
    image: postgis/postgis
    container_name: kora-postgis
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data



  backend:
    build: ./backend
    container_name: kora_backend
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_PORT: ${APP_PORT}
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - ./backend/src:/app/src

volumes:
  postgis_data:
    external: true