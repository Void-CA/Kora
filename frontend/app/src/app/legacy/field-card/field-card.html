@if (field(); as f) {
  <article class="field">
    <header class="field__header">
      <h1 class="field__name">{{ f.name }}</h1>
      <app-context-chips [items]="contextItems()" />
      <p class="field__sub">
        {{ f.crop }} en {{ f.growth }} · última actividad {{ f.last_activity }}
      </p>
    </header>

    <section class="field__top">
      <app-mini-map [caption]="f.name" />
      <div class="field__health">
        @for (h of f.health; track h.label) {
          <app-status-pill [status]="h.status" [label]="h.label" [value]="h.value" />
        }
      </div>
    </section>

    <section class="field__phases">
      <h2 class="field__section-label">Timeline del ciclo actual</h2>
      <app-cycle-timeline [phases]="f.phases" />
    </section>
  </article>
} @else if (error(); as e) {
  <p class="field__empty">{{ e }}</p>
} @else {
  <p class="field__empty">Cargando…</p>
}
