@if (current(); as field) {
  <article class="field">
    <header class="field__header">
      <h1 class="field__name">{{ field.name }}</h1>
      <app-context-chips [items]="contextItems()" />
      <p class="field__sub">
        {{ field.crop }} en {{ field.growth }} · última actividad {{ field.lastActivity }}
      </p>
    </header>

    <section class="field__top">
      <app-mini-map [caption]="field.name" />
      <div class="field__health">
        @for (h of field.health; track h.label) {
          <app-status-pill [status]="h.status" [label]="h.label" [value]="h.value" />
        }
      </div>
    </section>

    <section class="field__phases">
      <h2 class="field__section-label">Timeline del ciclo actual</h2>
      <app-cycle-timeline [phases]="field.phases" />
    </section>
  </article>
} @else {
  <p class="field__empty">Campo no encontrado.</p>
}
