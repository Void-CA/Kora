@if (vm(); as vm) {
  <header class="header"><h1 class="title">Finanzas</h1></header>

  <kora-profitability-summary
    [baseline]="vm.total_budget" [spent]="vm.total_spent"
    [revenue]="vm.total_revenue" [profit]="vm.profit" [roi]="vm.roi" />

  <div class="section-label">Ciclos</div>
  @for (c of vm.cycles; track c.cycle_name) {
    <div class="cycle-row" [class.cycle-row--attention]="c.status==='attention'">
      <div class="cycle-row__head"><span class="cycle-row__name">{{ c.cycle_name }}</span></div>
      <kora-budget-bar [percent]="spentPct(c.spent, c.budget)" [spent]="c.spent" [total]="c.budget" />
    </div>
  }
} @else { <p class="loading">Cargando…</p> }
