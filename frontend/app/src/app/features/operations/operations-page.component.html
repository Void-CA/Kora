@if (vm(); as vm) {
  <header class="header"><h1 class="title">Trabajo</h1><span class="date">{{ vm.date }}</span></header>

  <section class="group">
    <h2 class="group-title">En progreso</h2>
    @for (a of vm.in_progress; track a.id) {
      <kora-activity-card
        [id]="a.id" [title]="a.title" [field]="a.field" [crop]="a.crop"
        [scheduledTime]="a.scheduled_time" status="in_progress"
        [responsible]="a.responsible" [notes]="a.notes" />
    }
  </section>

  <section class="group">
    <h2 class="group-title">Pendientes</h2>
    @for (a of vm.pending; track a.id) {
      <kora-activity-card
        [id]="a.id" [title]="a.title" [field]="a.field" [crop]="a.crop"
        [scheduledTime]="a.scheduled_time" status="pending"
        [responsible]="a.responsible" [notes]="a.notes" />
    }
  </section>

  <section class="group">
    <h2 class="group-title group-title--muted">Completadas hoy</h2>
    @for (a of vm.completed; track a.id) {
      <kora-activity-card
        [id]="a.id" [title]="a.title" [field]="a.field" [crop]="a.crop"
        [scheduledTime]="a.scheduled_time" status="completed"
        [responsible]="a.responsible" [notes]="a.notes" />
    }
  </section>
} @else { <p class="loading">Cargando…</p> }
