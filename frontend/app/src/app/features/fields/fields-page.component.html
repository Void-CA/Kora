@if (vm(); as vm) {
  <header class="header"><h1 class="title">{{ vm.title }}</h1></header>
  <div class="grid">
    @for (f of vm.fields; track f.id) {
      <kora-field-summary
        [id]="f.id" [name]="f.name" [crop]="f.crop"
        [hectares]="f.hectares" [progress]="f.progress_percent"
        [daysToHarvest]="f.days_to_harvest"
        [lastActivity]="f.last_activity_name"
        [health]="f.health" variant="expanded"
        [cost]="f.cost_accumulated" [responsible]="f.responsible"
        [phases]="f.phases" />
    }
  </div>
} @else { <p class="loading">Cargando…</p> }
