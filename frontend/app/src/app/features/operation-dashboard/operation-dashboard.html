<header class="dashboard-header">
  <h1>{{ state()?.context_note ?? 'Operación' }}</h1>
</header>

@if (state(); as s) {
  <main class="dashboard-body">
    <section class="status-row">
      <app-status-summary [counts]="s.status" />
    </section>

    <section class="next-action-section">
      <h2 class="section-label">Siguiente acción</h2>
      <app-next-action-card [action]="s.next_action" />
    </section>

    <section class="attention-section">
      <h2 class="section-label">Requiere tu atención</h2>
      <app-attention-list [items]="s.attention" />
    </section>
  </main>
} @else if (error(); as e) {
  <p class="dashboard-error">No se pudo cargar la operación: {{ e }}</p>
} @else {
  <p class="dashboard-loading">Cargando…</p>
}
